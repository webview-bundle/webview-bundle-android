# This file was generated by the Gradle 'init' task.
# https://docs.gradle.org/current/userguide/build_environment.html#sec:gradle_configuration_properties

org.gradle.configuration-cache=true

# Give the daemon enough heap/metaspace for AGP + Kotlin; the defaults
# (512m heap / 384m metaspace) intermittently OOM and fail tasks spuriously.
org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8

# Required by the androidx.webkit dependency (optional service-worker interception).
android.useAndroidX=true

